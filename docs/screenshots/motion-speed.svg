<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340" role="img" aria-labelledby="t d" font-family="Segoe UI, Roboto, Arial, sans-serif">
<title id="t">WolfPack Dash — live speed</title>
<desc id="d">An animated speedometer arc, needle and digital readout sweeping with throttle and battery bars, in the app's dark theme with an orange accent.</desc>
<defs>
<linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#FF8A3D"/><stop offset="1" stop-color="#FF5E22"/>
</linearGradient>
</defs>
<rect x="6" y="6" width="708" height="328" rx="22" fill="#0c0d0f" stroke="#1c1f24" stroke-width="2"/>

<circle cx="196" cy="176" r="112" fill="none" stroke="#22262c" stroke-width="20" stroke-linecap="round" pathLength="100" stroke-dasharray="75 25" transform="rotate(135 196 176)"/>
<circle cx="196" cy="176" r="112" fill="none" stroke="url(#og)" stroke-width="20" stroke-linecap="round" pathLength="100" transform="rotate(135 196 176)" stroke-dasharray="0 100">
<animate attributeName="stroke-dasharray" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="0 100;15 100;33.75 100;56.25 100;75 100;45 100;22.5 100;0 100"/>
</circle>

<text x="196" y="192" text-anchor="middle" font-size="70" font-weight="700" fill="#EDEFF2"><tspan opacity="0"><animate attributeName="opacity" calcMode="discrete" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="1;0;0;0;0;0;0;1"/>0</tspan></text>
