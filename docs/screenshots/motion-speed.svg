<text x="196" y="192" text-anchor="middle" font-size="70" font-weight="700" fill="#EDEFF2" opacity="0"><animate attributeName="opacity" calcMode="discrete" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="0;0;1;0;0;0;0;0"/>28</text>
<text x="196" y="192" text-anchor="middle" font-size="70" font-weight="700" fill="#EDEFF2" opacity="0"><animate attributeName="opacity" calcMode="discrete" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="0;0;0;1;0;0;0;0"/>47</text>
<text x="196" y="192" text-anchor="middle" font-size="70" font-weight="700" fill="#FF8A3D" opacity="0"><animate attributeName="opacity" calcMode="discrete" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="0;0;0;0;1;0;0;0"/>62</text>
<text x="196" y="192" text-anchor="middle" font-size="70" font-weight="700" fill="#EDEFF2" opacity="0"><animate attributeName="opacity" calcMode="discrete" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="0;0;0;0;0;1;0;0"/>37</text>
<text x="196" y="192" text-anchor="middle" font-size="70" font-weight="700" fill="#EDEFF2" opacity="0"><animate attributeName="opacity" calcMode="discrete" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="0;0;0;0;0;0;1;0"/>19</text>
<text x="196" y="230" text-anchor="middle" font-size="17" font-weight="600" letter-spacing="3" fill="#7c828b">MPH</text>

<polygon points="196,86 201,176 191,176" fill="#FF8A3D">
<animateTransform attributeName="transform" type="rotate" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.26;0.42;0.56;0.74;0.9;1" values="225 196 176;279 196 176;346.5 196 176;427.5 196 176;495 196 176;387 196 176;306 196 176;225 196 176"/>
</polygon>
<circle cx="196" cy="176" r="11" fill="#33383f" stroke="#FF8A3D" stroke-width="3"/>

<text x="404" y="86" font-size="14" font-weight="600" letter-spacing="2" fill="#7c828b">THROTTLE</text>
